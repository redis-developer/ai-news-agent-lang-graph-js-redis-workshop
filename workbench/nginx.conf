events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # WebSocket support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        server_name localhost;

        # Workbench static files
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # ─────────────────────────────────────────────────────────────────────
        # Proxy rules for embedded services
        # Each service is accessible via path instead of port, making all
        # iframes same-origin and avoiding X-Frame-Options issues.
        #
        # To add a new service, copy any location block below and change:
        #   1. The path (e.g., /myservice/)
        #   2. The proxy_pass upstream (e.g., http://myservice:8080/)
        #
        # WARNING: Trailing slashes in proxy_pass matter!
        #   - With slash (http://host:port/):  strips location prefix from request
        #   - Without slash (http://host:port): preserves full path
        # Some services (like Vite, Redis Insight) need the path preserved.
        # Don't change these unless you understand the implications.
        # ─────────────────────────────────────────────────────────────────────

        location /docs/ {
            proxy_pass http://docs:80/;
            include /etc/nginx/proxy-params.conf;
        }

        location /vscode/ {
            proxy_pass http://vscode:8080/;
            include /etc/nginx/proxy-params.conf;
        }

        location /app/ {
            proxy_pass http://app:5173;
            include /etc/nginx/proxy-params.conf;
        }

        location /api/ {
            proxy_pass http://app:3000;
            include /etc/nginx/proxy-params.conf;
        }

        location /terminal/ {
            proxy_pass http://app:7681/;
            include /etc/nginx/proxy-params.conf;
        }

        location /redisinsight/ {
            proxy_pass http://redisinsight:5540;
            include /etc/nginx/proxy-params.conf;
        }
    }
}

